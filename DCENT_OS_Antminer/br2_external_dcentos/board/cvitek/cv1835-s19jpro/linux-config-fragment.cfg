# CV1835 S19j Pro — Linux kernel config fragment (W11.11)
# =============================================================================
# Source of truth: RE2 S19J_PRO_PORTING_PLAN.md §8 + RE2 BOOT_CHAIN_ANALYSIS.md.
# Stock kernel: Linux 4.9.38-tag- (Linaro LSK tree) + Cvitek cv1835 patches,
# ARM64, SMP PREEMPT, 4K pages, Linaro GCC 6.3.1, Dec 26 2022 build.
#
# ROLE OF THIS FRAGMENT (current  architecture):
#   - DCENT_OS does NOT compile a CV1835 kernel from Buildroot today. The
#     stock Cvitek 4.9.38 ARM64 kernel on `mmcblk0p1` stays in place; the
#     defconfig has BR2_LINUX_KERNEL DISABLED on purpose. This fragment
#     is the **documented compatibility envelope** — the surface the
#     stock kernel must satisfy for our ARM32-on-ARM64 userspace to run.
#   - When (if) we ever enable BR2_LINUX_KERNEL=y for a clean-room rebuild,
#     this is the fragment that wires through
#     BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES (see defconfig footer).
#
# WHY EVERY LINE MATTERS:
#   ARM32 userspace on ARM64 kernel via CONFIG_COMPAT — see
#   S19J_PRO_PORTING_PLAN.md:286 and :301.
#
# CONFIRMED LOAD-BEARING (must NOT regress):
# =============================================================================

# --- ARM32-on-ARM64 user-mode compatibility --------------------------------
# Required so our Linaro 7.2 armhf userspace runs on the Cvitek ARM64 kernel.
CONFIG_COMPAT=y
CONFIG_COMPAT_BINFMT_ELF=y
CONFIG_COMPAT_OLD_SIGACTION=y

# --- Initramfs / rootfs surface --------------------------------------------
# Required by stock /init flow per S19J_PRO_PORTING_PLAN.md:302-308.
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_BLK_DEV_INITRD=y
CONFIG_EXT4_FS=y
CONFIG_EXT4_USE_FOR_EXT2=y

# --- Userspace device interfaces dcentrald HAL relies on -------------------
# DevmemUart sits on /dev/mem and pwmchip0 sysfs (W10.3); I2C goes through
# i2c-dev character devices. NO kernel modules of our own ( #2 +
# ). Per S19J_PRO_PORTING_PLAN.md:305-307.
CONFIG_PWM=y
CONFIG_PWM_SYSFS=y
CONFIG_GPIO_SYSFS=y
CONFIG_I2C=y
CONFIG_I2C_CHARDEV=y
CONFIG_DEVMEM=y

# --- Network surface for the stock STMMAC ethernet -------------------------
# S19J_PRO_PORTING_PLAN.md:308 calls this out explicitly; CV1835 uses the
# Synopsys DesignWare STMMAC IP via the platform binding.
CONFIG_NET_VENDOR_STMICRO=y
CONFIG_STMMAC_ETH=y
CONFIG_STMMAC_PLATFORM=y

# --- Watchdog (DesignWare WDT used by stock cv183x_wdt.ko equivalent) ------
# We let upstream `dw_wdt` handle this rather than ship cv183x_wdt.ko.
CONFIG_WATCHDOG=y
CONFIG_DW_WATCHDOG=y

# --- eMMC (mmcblk0 backing /config /tmp/miner /nvdata + rootfs) ------------
CONFIG_MMC=y
CONFIG_MMC_BLOCK=y

# --- Optional but recommended (matches stock surface) ----------------------
CONFIG_TMPFS=y
CONFIG_TMPFS_POSIX_ACL=y
CONFIG_PROC_FS=y
CONFIG_SYSFS=y

# =============================================================================
# DO NOT ADD: cv183x_base, cv183x_pwm, uart_trans, or any out-of-tree CV1835
# proprietary module config.  decision #2 + memory rule
#  are load-bearing.
# =============================================================================
