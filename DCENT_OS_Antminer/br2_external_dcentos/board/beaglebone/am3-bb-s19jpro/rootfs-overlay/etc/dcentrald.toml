# DCENT_OS Mining Daemon Configuration - Antminer S19j Pro AM335x BB
#
# Installed-image profile for the S19J_IO_BOARD_V2_0 control board (AM335x
# BeagleBone, dsPIC fw89 rail control, BM1362). Mining ships OFF with an empty
# pool/worker by default — configure your pool and worker, then enable mining.

[general]
hostname = "dcentos-s19jpro-bb"
log_level = "debug"

[pool]
url = ""
protocol = "sv1"
worker = ""
password = "x"

[mining]
enabled = false
frequency_mhz = 400
voltage_mv = 13700
suggest_difficulty = 256
passthrough = false
version_rolling = true
serial_device = "/dev/ttyS1,/dev/ttyS2,/dev/ttyS4"
serial_chip_count = 126
serial_chip_type = "BM1362"
model = "s19jpro-bb"

[power]
target_watts = 800

[thermal]
target_temp_c = 60
hot_temp_c = 68
dangerous_temp_c = 75
fan_min_pwm = 10
fan_max_pwm = 30
pid_interval_s = 2.0

[api]
cgminer_port = 4028
http_port = 8080
websocket = true

[watchdog]
enabled = false

[hash_on_disconnect]
enabled = false

[autotuner]
enabled = false
