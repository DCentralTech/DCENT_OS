# DCENT_OS dcentrald config for Antminer S21 (Amlogic A113D)
# Unit: 203.0.113.135, BraiinsOS 25.11, 1x108 BM1368 (chain 2 only)
# Platform: Amlogic A113D (aarch64), NoPic (TAS5782M DAC, kernel-managed)
# PSU: GPIO 437 (PSU_nEN active LOW) plus APW I2C/PMBus enable at bus 1 addr 0x1f
#
# Fresh images stay dashboard-ready and idle until mining is explicitly enabled.

[general]
hostname = "dcent-s21"
log_level = "info"

[pool]
url = ""
worker = ""
password = "x"
protocol = "sv1"

[mining]
enabled = false
model = "s21"
frequency_mhz = 400
voltage_mv = 13550
version_rolling = true
passthrough = false
suggest_difficulty = 8192
serial_device = "/dev/ttyS2"
serial_chip_count = 108
serial_chip_type = "BM1368"

[power]
mode = "bypass"
target_watts = 1500

[power.psu_override]
enabled = true
model = "APW12"
voltage_v = 14.0

[thermal]
target_temp_c = 60
hot_temp_c = 70
dangerous_temp_c = 80
fan_min_pwm = 10
fan_max_pwm = 30

[api]
cgminer_port = 4028
http_port = 8080
websocket = true
auth_enabled = false
auth_password = ""

[donation]
enabled = false
percent = 2.0
pool_url = ""
worker = ""
password = "x"
cycle_duration_s = 3600

[watchdog]
# Autonomous crash-recovery for the NoPic Amlogic family. Unlike am2/S9 there is
# NO PIC/dsPIC hardware heartbeat backstop, so a silent (non-panicking) daemon
# hang would otherwise leave the boards energized indefinitely (thermal risk on a
# home space heater). The kicker opens /dev/watchdog AFTER hardware init (the
# bring-up window can't trip it) and degrades gracefully (warns + continues) if
# the SoC watchdog is unavailable or the timeout can't be set. Matches the proven
# zynq/am1 production config; restores the struct default (enabled=true) these
# overlays previously overrode.
enabled = true
timeout_s = 30
kick_interval_s = 5

[hash_on_disconnect]
enabled = true

[mode]
active = "standard"

[autotuner]
enabled = false
min_freq_mhz = 200
max_freq_mhz = 500

[led]
enabled = true
heartbeat_on_ms = 100
heartbeat_off_ms = 900
