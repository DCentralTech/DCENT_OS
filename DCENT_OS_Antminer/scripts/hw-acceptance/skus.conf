# DCENT_OS acceptance harness — per-SKU parameter table (single source of truth).
#
# One row per production-target Antminer SKU. Pipe-delimited. Comments start '#'.
# Consumed by dcent-accept.sh (IFS='|'); do NOT reorder columns.
#
# Columns:
#   1 sku            operator-facing SKU token (case-insensitive match arg)
#   2 board_target   /etc/dcentos/board_target the SKU boots as
#   3 arch           cross-compile target family: armv7 (Zynq) | aarch64 (Amlogic)
#   4 chip           ASIC part enumerated on the chain
#   5 chip_id        ChipID hex the auto-detect keys on (0 = capture-first / N/A)
#   6 enum_expect    expected total chip enumeration (0 = UNCONFIRMED, capture-first)
#   7 soc            control-board SoC family: zynq | amlogic
#   8 boot_chain     nand-ab (Zynq A/B) | single-image (Amlogic, no A/B)
#   9 release_state  PRODUCTION | EXPERIMENTAL | NOT-IMPLEMENTED  (release label)
#  10 package        hw-procedures package that owns the live residual
#  11 note           short human note
#
# release_state legend (public-launch honest labeling — never "untested/unknown"):
#   PRODUCTION      = live cold-boot accepted-share + persistent install + A/B all proven on this SKU.
#   EXPERIMENTAL    = code complete + host-tested (and often live-mining-proven), final witnessed
#                     capstone / SKU-exact live datum still pending. Works; not GA-signed.
#   NOT-IMPLEMENTED = SKU-specific datums UNCONFIRMED; rides a scaffold pending first-light capture.
#                     The CLI admits offline bootlog diagnosis only; live/deploy/install/OTA
#                     phases refuse before transport until the row is promoted.
#
