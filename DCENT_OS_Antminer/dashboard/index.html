<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DCENT_OS</title>
  <style id="boot-splash-style">
    html,body,#root{min-height:100%;margin:0;background:#070710;color:#fff8e8}
    #boot-splash{min-height:100vh;display:grid;place-items:center;overflow:hidden;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 50% 46%,rgba(250,165,0,.18),transparent 34%),#070710}
    #boot-splash .boot-core{display:grid;justify-items:center;gap:18px;transform:translateY(-2vh)}
    #boot-splash svg{width:96px;height:96px;filter:drop-shadow(0 0 22px rgba(250,165,0,.38))}
    #boot-splash .boot-word{font-size:15px;font-weight:700;letter-spacing:.16em;color:#fff8e8}
    #boot-splash .boot-bar{width:172px;height:3px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.12)}
    #boot-splash .boot-bar span{display:block;width:44%;height:100%;border-radius:inherit;background:linear-gradient(90deg,transparent,#faa500,#fa6700,transparent);transform:translateX(-100%)}
    @media (prefers-reduced-motion:no-preference){#boot-splash svg{animation:boot-pulse 1.8s ease-in-out infinite}#boot-splash .boot-bar span{animation:boot-scan 1.25s ease-in-out infinite}@keyframes boot-pulse{50%{transform:scale(1.035)}}@keyframes boot-scan{to{transform:translateX(235%)}}}
  </style>
</head>
<body>
  <div id="root">
    <div id="boot-splash" role="status" aria-label="Loading DCENT_OS">
      <div class="boot-core">
        <svg viewBox="0 0 96 96" aria-hidden="true">
          <defs>
            <linearGradient id="boot-accent" x1="18" y1="78" x2="78" y2="18">
              <stop stop-color="#FA6700" />
              <stop offset="1" stop-color="#FAA500" />
            </linearGradient>
          </defs>
          <path fill="none" stroke="url(#boot-accent)" stroke-width="8" stroke-linecap="round" d="M48 10a38 38 0 1 1-26.9 11.1" />
          <path fill="url(#boot-accent)" d="M35 24h18c14 0 24 10 24 24S67 72 53 72H35V24Zm13 12v24h5c7 0 11-5 11-12s-4-12-11-12h-5Z" />
        </svg>
        <div class="boot-word">DCENT_OS</div>
        <div class="boot-bar" aria-hidden="true"><span></span></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
