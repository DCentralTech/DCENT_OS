# DCENT_OS runtime template for Antminer T15 (BM1391).
# Unsupported scaffold: host-parse only; mining stays disabled until BP-S15-BRINGUP.

[general]
hostname = "dcentos-t15"
log_level = "info"

[pool]
url = ""
worker = ""
password = "x"
protocol = "sv1"

[mining]
enabled = false
model = "t15"
frequency_mhz = 500
voltage_mv = 12000
version_rolling = false
passthrough = false
suggest_difficulty = 256
serial_device = "/dev/ttyS1"
serial_chip_count = 63
serial_chip_type = "BM1391"

[power]
mode = "bypass"
target_watts = 900

[power.psu_override]
enabled = false
model = "APW3"
voltage_v = 12.8

[thermal]
target_temp_c = 60
hot_temp_c = 70
dangerous_temp_c = 80
fan_min_pwm = 10
fan_max_pwm = 30

[api]
cgminer_port = 4028
http_port = 8080
websocket = true

[donation]
enabled = false
percent = 2.0
pool_url = ""
worker = ""
password = "x"
cycle_duration_s = 3600

[watchdog]
enabled = true

[hash_on_disconnect]
enabled = false

[mode]
active = "standard"

[autotuner]
enabled = false

[led]
enabled = true
heartbeat_on_ms = 100
heartbeat_off_ms = 900
