[build]
target = "xtensa-esp32s3-espidf"

[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
# runner = "espflash flash --monitor"

rustflags = [
    "--cfg", "espidf_time64",
]

[unstable]
build-std = ["std", "panic_abort"]

[env]
CARGO_WORKSPACE_DIR = { value = "", relative = true }
MCU = "esp32s3"
ESP_IDF_VERSION = "v5.4"
ESP_IDF_TOOLS_INSTALL_DIR = "global"
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "sdkconfig.defaults", relative = true }
# esp-idf-sys builds a generated ESP-IDF project under OUT_DIR. A custom
# partition table filename in sdkconfig is resolved relative to that generated
# project, so stage the repo-owned CSV before CMake evaluates sdkconfig.
ESP_IDF_GLOB_PROJECT_BASE = { value = ".", relative = true }
ESP_IDF_GLOB_PROJECT_PARTITIONS = "partitions.csv"
# Cross-compiler for secp256k1-sys (libsecp256k1 C code) on xtensa
CC_xtensa_esp32s3_espidf = "xtensa-esp32s3-elf-gcc"
# -mlongcalls needed for large C libraries (secp256k1) on xtensa — CALL8 range is limited
CFLAGS_xtensa_esp32s3_espidf = "-mlongcalls"
