# DCENT_OS dcentrald config — Antminer T21 Amlogic (am3-aml-t21)
# D-Central Technologies — Phase 4B scaffold (2026-05-15)
#
# T21 is the second NoPic Amlogic carrier (lower-tier sibling of S21).
# Same A113D SoC, same 4.9.113 kernel, same BM1368 ASIC family. The
# difference vs S21 is per-chain chip count (76 vs 108) and rated
# hashrate / power envelope.
#
# Platform identity:
#   /etc/dcentos-platform           = am3-aml-t21
#   /etc/dcentos/board_family       = am3
#   /etc/dcentos/board_target       = am3-t21
#
# Status: NO LIVE UNIT yet. Mining disabled by default. NoPic
# voltage-control path inherits from S21 (TAS5782M DAC, kernel-managed)
# — `S21AmlogicNoPic` sentinel in `dcentrald-silicon-profiles::pics`.
#
# Override order: /data/dcentrald.toml > /etc/dcentrald.toml. Operator
# customizations belong in /data/ (survives sysupgrade).

[general]
hostname = "dcentos-t21"
log_level = "info"

[mining]
enabled = false
chip = "BM1368"
chips_per_chain = 76
chains = 3
frequency_mhz = 525
voltage_mv = 13550
model = "t21"
suggest_difficulty = 8192
passthrough = false
version_rolling = true

[platform]
target = "am3-aml-t21"

[pool]
url = ""
worker = ""
password = "d=1"

[thermal]
target_temp_c = 60.0
hot_temp_c = 70.0
dangerous_temp_c = 80.0
die_dangerous_c = 105.0
cooldown_temp_c = 45.0
min_fan_rpm = 2000
fan_max_pwm = 30
fan_min_pwm = 0

[psu]
# APW12-class (PMBus) plus GPIO 437 rail gate. Same APW12 SMBus driver
# as S21 (`dcentrald-hal::psu_apw12_smbus`).
model = "APW12"
power_target_w = 1500
power_step_w = 300
hashrate_target_ths = 60.0
hashrate_step_ths = 5.0

[power]
mode = "bypass"
target_watts = 1500

[power.psu_override]
enabled = false
model = "APW12"
voltage_v = 14.0

[hashboard]
# T21 ships S21-class hashboards. NoPic — voltage rail is TAS5782M
# DAC at I²C 0x49/0x4A/0x4B (bus 0), kernel-managed via DTB.
eeprom_parser = "bhb42xxx"

[api]
cgminer_port = 4028
http_port = 8080
websocket = true
cgminer_bind_lan = false
# API-1 (security): allow MUTATING CGMiner/LuxOS verbs (addpool/switchpool/
# config changes) from NON-loopback LAN peers. DEFAULT false (fail-closed):
# even with cgminer_bind_lan=true, remote mutating verbs stay blocked unless
# this is ALSO true (loopback writes always work). Set true ONLY on a trusted LAN.
cgminer_lan_writes = false
metrics_require_auth = true

[donation]
# Voluntary 2% donation supports open-source firmware development.
enabled = true
percent = 2.0
pool_url = "stratum+tcp://pool.d-central.tech:3333"
worker = "DungeonMaster"
password = "x"
fallback_enabled = true
fallback_pool_url = "stratum+tcp://stratum.braiins.com:3333"
fallback_worker = "DungeonMaster"
fallback_password = "x"
cycle_duration_s = 3600

[watchdog]
# Autonomous crash-recovery for the NoPic Amlogic family. Unlike am2/S9 there is
# NO PIC/dsPIC hardware heartbeat backstop, so a silent (non-panicking) daemon
# hang would otherwise leave the boards energized indefinitely (thermal risk on a
# home space heater). The kicker opens /dev/watchdog AFTER hardware init (the
# bring-up window can't trip it) and degrades gracefully (warns + continues) if
# the SoC watchdog is unavailable or the timeout can't be set. Matches the proven
# zynq/am1 production config; restores the struct default (enabled=true) these
# overlays previously overrode.
enabled = true
timeout_s = 30
kick_interval_s = 5

[hash_on_disconnect]
enabled = true

[mode]
active = "home"

[autotuner]
enabled = false
min_freq_mhz = 200
max_freq_mhz = 500

[led]
enabled = true
heartbeat_on_ms = 100
heartbeat_off_ms = 900
locate_pattern = "imperial_march"
locate_duration_s = 30
flash_on_accepted_share = true
flash_on_rejected_share = true
night_mode_disable = false
celebration_on_lucky_share = true
chain_status_blink_codes = true
