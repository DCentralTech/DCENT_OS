# DCENT_OS dcentrald BAKED DEFAULT config — S17 / S17 Pro am2 (Zynq am2-s17)
# D-Central Technologies, 2026-05-15
#
#  Phase 2E — this is the default config baked into
# `/etc/dcentrald.toml` on every Buildroot-built am2-s17pro-zynq image. It is
# cloned from `dcentrald_s19jpro_am2_baked_default.toml` (the am2-s19jpro BM1362
# baked default) and re-pointed at the BM1397 / S17 Pro hashboard family.
#
# ## RUNTIME-ONLY — NO COLD-BOOT PROOF ########################################
# There is NO live Antminer S17 / S17 Pro on the D-Central fleet. Every value
# below that is S17-specific (frequency_mhz, voltage_mv, serial_chip_count,
# serial_chip_type, model) is a BEST-GUESS scaffold derived from the
# chip-survey BM1397 silicon profile and the S17 RE corpus
# (S17_VNISH_FIRMWARE_RE_ANALYSIS.md) — NONE of it has been confirmed against
# a live unit. This image is for pipeline / package-validator regression
# coverage ONLY. mining.enabled stays false; the operator MUST configure pool
# AND confirm the chip envelope on a bench unit before enabling.
#
# ## UNCONFIRMED (v2 open question → R11) #####################################
# S17 / S17 Pro / T17 route through BM1397. S17+ / T17+ route through
# BM1396, whose driver intentionally stays fail-closed until a live enumerate
# bench gate validates dispatch. Do not use this S17 Pro baked default for a
# plus-family unit; use an explicit management-only BM1396 runtime config. See:
#
#     §4.6 (BM1397) + §4.10 (BM1396)
#   - DCENT_OS_Antminer/br2_external_dcentos/board/zynq/am2-s17pro/README.md
#############################################################################
#
# Safety invariants that MUST NEVER change from baked defaults (inherited
# verbatim from the am2-s19jpro baked default — same am2 Zynq control board,
# same dsPIC33EP16GS202 framed voltage path, same APW-class PSU):
#
#   * mining.voltage_mv hard-clamped <=14_500 by DcentraldConfig::validate()
#     on am2 platforms (Phase 4C, commit 747947e4)
#   * thermal.fan_max_pwm = 30        — home-quiet ceiling
#
#   * thermal.dangerous_temp_c = 80   — fail-closed Am2ThermalSupervisor
#   * thermal.hot_temp_c = 70         — fan-step / hash-throttle threshold
#   * hash_on_disconnect.enabled = false — home/unattended safety
#   * mining.am2_no_nonce_timeout_s = 90 — home hard-stop trigger
#
# /data/dcentrald.toml takes precedence on every boot, so operator overrides
# are safe and non-destructive.
#
# NEVER-VIOLATE rules baked in (same am2 control board as am2-s19jpro):
#   * Deferred voltage gate on stable heartbeat ticks
#   * Board-temp I2C NACK → XADC die-temp fallback
#   * AXI IIC unbind/SOFTR NEVER on am2
#   * Fan ceiling PWM 30 for home mining ( /
#     )
#   * EEPROM 0x50..0x57 HAL write-denylist registered at am2 platform init
#     (.74 hb2 incident 2026-04-29)

[general]
hostname = "dcentos-s17pro"
log_level = "info"

[pool]
# Operator MUST configure this via the dashboard or by editing
# /data/dcentrald.toml before mining starts. Empty pool/worker keeps the
# daemon in idle/API-only mode (see `has_configured_pool()` in config.rs).
url = ""
worker = ""
password = "x"
protocol = "sv1"

[mining]
# Idle-first default. RUNTIME-ONLY scaffold — operator MUST confirm the S17
# chip envelope on a bench unit AND configure pool before flipping this true.
enabled = false

# UNCONFIRMED S17 Pro chip-rail target. BM1397 nameplate Step 0 is
# 675 MHz / 13.8 V (chip-survey §4.6). Conservative scaffold value; the dsPIC
# regulates the PSU rail down to this. Hard-clamped <=14_500 mV by validate()
# on am2. Operator MUST verify on a live unit before enabling mining.
voltage_mv = 13700

# UNCONFIRMED. BM1397 S17 Pro nameplate Step 0 ≈ 675 MHz; scaffolded
# conservatively below nameplate until a live unit confirms the PLL envelope.
frequency_mhz = 500
am2_pll_ramp = false

# Home/lab safety guard: force PWR_CONTROL low after first work dispatch if
# the FPGA never returns a nonce. Prevents overnight PWR-high stalls.
am2_no_nonce_timeout_s = 90

# Low-difficulty accepted-share proof target for first runs.
suggest_difficulty = 256

# Cold-boot init path (NOT passthrough — passthrough on am2 produces zero RX;
# proven on .139 Phase 13/14, same am2 control board).
passthrough = false

# BM1397 is BM139x family: 4-midstate AsicBoost (NOT BIP320 chip-side
# version-rolling). ASIC-side version rolling stays DISABLED.
version_rolling = false

serial_device = "/dev/ttyS1"
# UNCONFIRMED: S17 Pro = 3 chains x 48 chips. This field is chips PER CHAIN,
# not total chips; 48 is the serial address-assignment denominator.
serial_chip_count = 48
# UNCONFIRMED: "BM1397" = S17 / S17 Pro / T17. S17+ / T17+ are BM1396 and
# must not silently borrow this driver.
serial_chip_type = "BM1397"

fpga_chain_base = "0x43C00000"
fpga_chain_id = 1

# Force the S17 MinerProfile, bypassing chip auto-detect. UNCONFIRMED routing
# target — `ZynqVariant::S17` is code-only / `// XXX: confirm against live S17`.
model = "s17pro"

skip_fifo_reset = false
skip_board_temp = false

[power]
psu_bypass = false

# Conservative ceiling for a stock am2 S17 chassis. S17 Pro nameplate is
# ~3182 W (chip-survey §4.6) but the home-mining scaffold caps low until a
# live unit + operator confirm the PSU + ambient envelope.
max_watts = 1200

circuit_capacity_watts = 4800
circuit_voltage_v = 240
circuit_amperage_a = 20

# --- PSU OVERRIDE ("Loki bypass") -------------------------------------------
# DISABLED by default — the baked image assumes a stock APW-class PSU in the
# chassis. S17 / S17 Pro stock PSU is APW3++ / APW9-class with PMBus telemetry
# (revert_to_stock_s17.sh header). The Loki bypass is a per-unit power
# configuration, not a control-board variant
#.
[power.psu_override]
enabled = false
model = "APW3"
voltage_v = 12.8

[psu]
# APW-class rail params (consumed only when [power.psu_override].enabled =
# false). UNCONFIRMED for S17 — S17 voltage ramp is 21 V → 18.5 V gradual
# per S17_VNISH_FIRMWARE_RE_ANALYSIS.md §2.4, distinct from the BM1362
# 15.2 V rail. This block is a scaffold placeholder; do NOT trust it on a
# live S17 until RE confirms the S17 dsPIC voltage envelope.
voltage_mv = 15200
heartbeat_hz = 1
watchdog_enabled = true
i2c_address = 0x10
transport = "gpio_bitbang"
pwr_control_gpio = "gpio:907"

[thermal]
target_temp_c = 60
hot_temp_c = 70
dangerous_temp_c = 80

# Home-quiet fan ceiling. NEVER raise above 30 from a baked default.
fan_min_pwm = 10
fan_max_pwm = 30

pid_interval_s = 2.0
hysteresis_c = 3

[thermal.supervisor]
# Dormant unless the operator or a validated platform-default gate enables it.
# am2 chassis are four-fan systems; one working tach is never enough once the
# supervisor is active.
enabled = false
min_fans = 3

[api]
cgminer_port = 4028
http_port = 8080
websocket = true
cgminer_bind_lan = false
metrics_require_auth = true

[donation]
# production donation policy: transparent 2% default, fully
# disableable by the operator.
enabled = true
percent = 2.0
pool_url = "stratum+tcp://pool.d-central.tech:3333"
worker = "DungeonMaster"
password = "x"
fallback_enabled = true
fallback_pool_url = "stratum+tcp://stratum.braiins.com:3333"
fallback_worker = "DungeonMaster"
fallback_password = "x"
cycle_duration_s = 3600

[watchdog]
# Hardware watchdog ENABLED by default on a baked image.
enabled = true
kick_interval_s = 5

[hash_on_disconnect]
# Home/unattended safety: never continue hashing stale work during a
# pool/control failure.
enabled = false

[mode]
active = "standard"

[autotuner]
# Disabled by default — RUNTIME-ONLY scaffold, no live S17 nonce ever.
enabled = false

[led]
enabled = true
heartbeat_on_ms = 100
heartbeat_off_ms = 900
flash_on_accepted_share = true
flash_on_rejected_share = true
